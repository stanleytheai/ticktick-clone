version: "3.8"

services:
  # ── Node.js Backend ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - FIRESTORE_EMULATOR_HOST=firebase:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase:9099
      - GCLOUD_PROJECT=ticktick-clone-local
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    command: npm run dev
    depends_on:
      firebase:
        condition: service_healthy
    networks:
      - app-network

  # ── Firebase Emulators ───────────────────────────────
  firebase:
    image: node:20-alpine
    ports:
      - "4000:4000"   # Emulator UI
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
    volumes:
      - ./firebase.json:/app/firebase.json
      - ./firestore.rules:/app/firestore.rules
      - ./firestore.indexes.json:/app/firestore.indexes.json
      - firebase-data:/app/data
    working_dir: /app
    command: >
      sh -c "npm install -g firebase-tools &&
             firebase emulators:start
             --project ticktick-clone-local
             --import ./data
             --export-on-exit ./data"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - app-network

volumes:
  firebase-data:

networks:
  app-network:
    driver: bridge
